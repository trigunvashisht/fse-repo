name: My First Workflow

on: push

jobs:
  say-job1:
    runs-on: ubuntu-latest 

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Node
        uses: actions/setup-node@v4

      - name: Check Node version
        run: node -v

      - name: starting test
        run: npm run test

      - name: List files
        run: ls

      - name: Print Name
        run: echo "Trigun"
  deploy:
    runs-on: ubuntu-latest
    needs: say-job1

  say-job2:
    runs-on: ubuntu-latest  
    needs: say-job1

    steps:
      - name: Print Goodbye
        run: echo "Goodbye"