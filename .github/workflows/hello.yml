name: My First Workflow

on: push

jobs:
  say-hello:
    runs-on: ubuntu-latest 

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4

      - name: Check Node version
        run: node -v  

      - name: list file
        run: ls

      - name: Print Name
        run: echo "Trigun"

  say-bye:
    runs-on: ubuntu-latest  
    needs: say-hello

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Print Goodbye
        run: echo "Goodbye"